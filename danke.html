<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Danke – accountaneers</title>
<meta name="description" content="Vielen Dank für deine Nachricht an accountaneers." />
<meta name="robots" content="noindex, follow" />
<link rel="icon" type="image/png" href="assets/icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{--navy:#1D2F52;--teal:#299198;--teal-dark:#1F787D;--gold:#E0922D;--ink:#1E2833;--slate:#6B7685;--cream:#F6F2E9;}
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{font-family:'Roboto',system-ui,-apple-system,'Segoe UI',sans-serif;color:#fff;line-height:1.7;-webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(1100px 520px at 82% -12%, rgba(41,145,152,.42), transparent 60%),
      radial-gradient(760px 420px at 8% 115%, rgba(224,146,45,.20), transparent 60%),
      linear-gradient(160deg,#1D2F52 0%, #182848 55%, #12213d 100%);}
  .card{max-width:540px;text-align:center}
  .ic{width:84px;height:84px;border-radius:50%;margin:0 auto 28px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--teal),var(--teal-dark));box-shadow:0 18px 44px -18px rgba(41,145,152,.8)}
  h1{font-family:'Hanken Grotesk',sans-serif;font-size:clamp(1.9rem,4vw,2.6rem);font-weight:800;margin-bottom:16px;letter-spacing:-.01em}
  p{color:rgba(255,255,255,.82);font-size:1.1rem;margin-bottom:32px}
  .btn{display:inline-flex;align-items:center;gap:.5rem;font-family:'Hanken Grotesk',sans-serif;font-weight:700;
    padding:.9rem 1.8rem;border-radius:999px;background:var(--gold);color:var(--navy);text-decoration:none;
    transition:transform .18s ease, background .18s ease, color .18s ease}
  .btn:hover{background:#C17A1C;color:#fff;transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="card">
    <div class="ic">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><path d="M20 6 9 17l-5-5" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>Vielen Dank für deine Nachricht!</h1>
    <p>Wir haben deine Anfrage erhalten und melden uns zeitnah persönlich bei dir zurück.</p>
    <a class="btn" href="/">Zurück zur Startseite</a>
  </div>
</body>
</html>
